name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          sources=$(find src/ -name "*.cpp" 2>/dev/null)
          if [ -z "$sources" ]; then
            echo "No source files yet — skipping build."
            exit 0
          fi
          make

      - name: Run unit tests (C++)
        run: |
          cpp_tests=$(find tests/ -name "*.cpp" 2>/dev/null | sort)
          if [ -z "$cpp_tests" ]; then
            echo "No C++ unit tests found — skipping."
            exit 0
          fi
          failed=0
          for f in $cpp_tests; do
            echo "--- Compiling $f ---"
            bin=$(mktemp /tmp/test_XXXXXX)
            c++ -Wall -Wextra -Werror -std=c++98 -I include "$f" $(find src/ -name "*.cpp") -o "$bin" || { failed=1; continue; }
            echo "--- Running $f ---"
            "$bin" || failed=1
          done
          exit $failed

      - name: Run tests
        run: |
          # Auto-discovers all test scripts — no workflow change needed when adding a test.
          # Priority: tests/run_all.sh if it exists, otherwise find all .sh/.py in tests/
          if [ ! -f webserv ]; then
            echo "No binary — skipping tests."
            exit 0
          fi
          if [ -f tests/run_all.sh ]; then
            bash tests/run_all.sh
          else
            scripts=$(find tests/ \( -name "*.sh" -o -name "*.py" \) 2>/dev/null | sort)
            if [ -z "$scripts" ]; then
              echo "No tests found — skipping."
              exit 0
            fi
            failed=0
            echo "$scripts" | while read -r f; do
              echo "--- Running $f ---"
              bash "$f" || failed=1
            done
            exit $failed
          fi
