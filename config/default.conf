server {
    listen 8080;
    host 127.0.0.1;
    server_name webserv.com;
    client_max_body_size 1m;
    error_page 404 /errors/404.html;

    location / {
        root /var/www;
        index index.html;
        methods GET POST;
        autoindex off;
    }

    location /uploads {
        root /var/www/uploads;
        methods POST DELETE;
        upload_store /var/www/uploads;
    }

    location /cgi-bin {
        cgi_extensions .php /usr/bin/php-cgi;
    }
}